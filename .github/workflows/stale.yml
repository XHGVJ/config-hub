name: "Close stale issues and PRs"

on:
  schedule:
  - cron: "0 0 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@v8
      with:
        stale-issue-message: "This issue is stale because it has been open 30 天之前 with no activity."
        stale-pr-message: "This PR is stale because it has been open 30 天之前 with no activity."
        days-before-stale: 30
        days-before-close: 7

